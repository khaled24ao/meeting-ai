app:
  name: MeetingAI
  debug: false
  host: 0.0.0.0
  port: 7860

upload:
  folder: storage/uploads
  max_size_mb: 25
  allowed_extensions:
    - mp3
    - mp4
    - wav
    - m4a

transcription:
  max_length: 4000
  whisper_model: tiny

ai:
  provider: groq
  model: llama-3.1-8b-instant
  temperature: 0.5
  max_tokens: 1024

logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"